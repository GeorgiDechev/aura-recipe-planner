<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Aura Cooking | Recipe Planner</title>
    <!-- Google Fonts: Quicksand for a warm, friendly kitchen vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/main.css">
    <meta name="theme-color" content="#fdfcdc">
</head>

<body>
    <div id="app">
        <!-- Main Application Content -->
        <main class="main-content">
            <header class="top-bar">
                <div>
                    <h1 id="page-title">Recipe Book</h1>
                    <p class="date-subtitle" id="current-date">Today</p>
                </div>
                <div class="header-actions">
                    <!-- AI Gen / Settings placeholder -->
                    <button class="btn btn-icon" id="btn-ai-generate">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83">
                            </path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="view-container">
                <!-- Views -->
                <div id="recipes-view" class="view active-view">
                    <div class="recipes-header">
                        <input type="text" id="recipe-search" placeholder="Search recipes..." class="search-input">
                        <button id="add-recipe-btn" class="btn btn-primary">+ Add</button>
                    </div>
                    <div class="recipe-grid" id="recipe-list">
                        <!-- Recipes rendered here -->
                    </div>
                </div>

                <div id="planner-view" class="view">
                    <h2>Weekly Planner</h2>
                    <!-- Weekly planner UI to be built in JS -->
                    <div id="planner-container"></div>
                </div>

                <div id="grocery-view" class="view">
                    <h2>Grocery List</h2>
                    <div class="card">
                        <ul class="grocery-list" id="grocery-items">
                            <!-- Generated grocery items -->
                        </ul>
                    </div>
                </div>

                <div id="cooking-view" class="view">
                    <h2>Cooking Mode</h2>
                    <div style="margin-bottom: 1.5rem;">
                        <select id="cooking-recipe-select" class="search-input">
                            <option value="">-- Choose a Recipe to Cook --</option>
                        </select>
                    </div>
                    <div id="cooking-container" class="card cooking-card">
                        <p class="empty-state">Select a recipe from the dropdown above to start cooking!</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation Bar -> Mobile First -->
        <nav class="bottom-nav">
            <ul class="nav-links">
                <li class="active" data-target="recipes">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span>Recipes</span>
                </li>
                <li data-target="planner">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span>Planner</span>
                </li>
                <li data-target="grocery">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <span>Groceries</span>
                </li>
                <li data-target="cooking">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    <span>Cook</span>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Recipe Add/Edit Modal (Hidden by default) -->
    <div id="recipe-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content card">
            <h2 id="modal-title">Add New Recipe</h2>
            <form id="recipe-form">
                <input type="hidden" id="entry-id">
                <div class="form-group">
                    <label>Recipe Title</label>
                    <input type="text" id="entry-title" class="search-input" placeholder="e.g. Grandma's Lasagna"
                        required>
                </div>
                <div class="form-group">
                    <label>Image URL (Optional)</label>
                    <input type="url" id="entry-image" class="search-input" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Ingredients (One per line)</label>
                    <textarea id="entry-ingredients" class="search-input" rows="4"
                        placeholder="1 cup flour&#10;2 eggs&#10;1/2 tsp salt" required></textarea>
                </div>
                <div class="form-group">
                    <label>Instructions</label>
                    <textarea id="entry-instructions" class="search-input" rows="4"
                        placeholder="1. Preheat oven to 350F...&#10;2. Mix dry ingredients..." required></textarea>
                </div>
                <div class="modal-actions" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" id="btn-cancel-recipe" class="btn btn-outline"
                        style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Recipe</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./src/api.js"></script>
    <script src="./src/main.js"></script>
</body>

</html>
